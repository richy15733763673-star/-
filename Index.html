<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'PingFang SC', sans-serif; background-color: #f8fafc; }
        .active-tab { border-bottom: 2px solid #2563eb; color: #2563eb; font-weight: 600; }
        .sidebar-active { background-color: #eff6ff; color: #2563eb; border-right: 4px solid #2563eb; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        /* 隐藏滚动条但保留滚动功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-slate-800">

    <nav class="sticky top-0 z-50 w-full bg-white border-b border-slate-200 px-4 py-3 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold text-xl">W</div>
            <span class="font-bold text-lg tracking-tight text-blue-900">文登教育 <span class="text-slate-400 font-normal">| 六级冲刺</span></span>
        </div>
        
        <div class="flex bg-slate-100 p-1 rounded-xl">
            <button onclick="switchRole('student')" id="btn-student" class="px-4 py-1.5 rounded-lg text-sm transition-all duration-200 role-btn bg-white shadow-sm text-blue-600 font-medium">学生端</button>
            <button onclick="switchRole('teacher')" id="btn-teacher" class="px-4 py-1.5 rounded-lg text-sm transition-all duration-200 role-btn text-slate-500">教师端</button>
            <button onclick="switchRole('ops')" id="btn-ops" class="px-4 py-1.5 rounded-lg text-sm transition-all duration-200 role-btn text-slate-500">运营端</button>
        </div>

        <div class="flex items-center gap-3">
            <div class="hidden md:block text-right">
                <p class="text-xs text-slate-500">当前用户</p>
                <p class="text-sm font-medium" id="user-name">西安南大学城学生</p>
            </div>
            <div class="w-10 h-10 bg-slate-200 rounded-full border-2 border-white shadow-sm overflow-hidden">
                <img src="https://placehold.co/100x100/2563eb/ffffff?text=User" alt="Avatar">
            </div>
        </div>
    </nav>

    <div class="flex min-h-[calc(100vh-64px)]">
        <aside id="sidebar" class="w-64 bg-white border-r border-slate-200 flex-shrink-0 flex flex-col transition-all">
            <div class="p-4 space-y-1" id="sidebar-content">
                <!-- 动态注入侧边栏内容 -->
            </div>
            <div class="mt-auto p-4 border-t border-slate-100">
                <div class="bg-blue-50 p-4 rounded-xl">
                    <p class="text-xs text-blue-600 font-bold mb-1 uppercase tracking-wider">课程倒计时</p>
                    <p class="text-sm text-blue-900 font-medium italic">最近一次课: 周三 19:00</p>
                </div>
            </div>
        </aside>

        <main class="flex-grow p-6 md:p-10 overflow-y-auto no-scrollbar" id="main-content">

    <script>

        let currentPage = 'st-1';

        const pages = {

                { id: 'st-3', name: '课前预习中心', icon: '📚' },
                { id: 'st-4', name: '课中学习页', icon: '✍️' },
                { id: 'st-5', name: '批改报告查看', icon: '📄' },
                { id: 'st-6', name: '模考测评页', icon: '⏱️' }
            ],
            teacher: [
                { id: 'te-1', name: '教师工作台', icon: '📊' },
                { id: 'te-2', name: '学员信息管理', icon: '👥' },
                { id: 'te-3', name: '作业批改页', icon: '✒️' },
                { id: 'te-4', name: '课堂管理页', icon: '🏫' },
                { id: 'te-5', name: '教学数据查看', icon: '📈' }
            ],
            ops: [
                { id: 'op-1', name: '数据总览看板', icon: '🌍' },
                { id: 'op-2', name: '转化漏斗看板', icon: '🌪️' },
                { id: 'op-3', name: '学员画像看板', icon: '👤' },
                { id: 'op-4', name: '运营任务管理', icon: '📅' }

        function switchRole(role) {
            currentRole = role;
            // 更新按钮样式
            document.querySelectorAll('.role-btn').forEach(btn => {
                btn.classList.remove('bg-white', 'shadow-sm', 'text-blue-600', 'font-medium');
                btn.classList.add('text-slate-500');
            });
            const activeBtn = document.getElementById(`btn-${role}`);
            activeBtn.classList.remove('text-slate-500');
            activeBtn.classList.add('bg-white', 'shadow-sm', 'text-blue-600', 'font-medium');

            // 更新用户信息
            const names = { student: '张同学 (西安外国语)', teacher: '王教授 (文登名师)', ops: '李经理 (南分部运营)' };
            document.getElementById('user-name').innerText = names[role];

            // 渲染侧边栏
            renderSidebar();
            // 切换到该角色的第一个页面
            switchPage(pages[role][0].id);
        }

        function renderSidebar() {
            const sidebar = document.getElementById('sidebar-content');
            sidebar.innerHTML = pages[currentRole].map(p => `
                <button onclick="switchPage('${p.id}')" id="side-${p.id}" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all hover:bg-slate-50">
                    <span class="text-xl">${p.icon}</span>
                    <span>${p.name}</span>
                </button>
            `).join('');
        }

        function switchPage(pageId) {
            currentPage = pageId;
            document.querySelectorAll('#sidebar-content button').forEach(btn => {
                btn.classList.remove('sidebar-active');
            });
            document.getElementById(`side-${pageId}`).classList.add('sidebar-active');
            renderContent(pageId);
        }
